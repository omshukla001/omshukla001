<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="200" viewBox="0 0 1200 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0e14;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="scanLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#00e5ff;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="glowLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0" />
      <stop offset="20%" style="stop-color:#00e5ff;stop-opacity:0.3" />
      <stop offset="80%" style="stop-color:#00b8d4;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="200" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="0" x2="0" y2="200" stroke="#00e5ff" stroke-width="0.5">
      <animate attributeName="x1" values="0;1200" dur="20s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;1200" dur="20s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="40" x2="1200" y2="40" stroke="#00e5ff" stroke-width="0.3"/>
    <line x1="0" y1="80" x2="1200" y2="80" stroke="#00e5ff" stroke-width="0.3"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="#00e5ff" stroke-width="0.3"/>
    <line x1="0" y1="160" x2="1200" y2="160" stroke="#00e5ff" stroke-width="0.3"/>
    <line x1="100" y1="0" x2="100" y2="200" stroke="#00e5ff" stroke-width="0.3"/>
    <line x1="200" y1="0" x2="200" y2="200" stroke="#00e5ff" stroke-width="0.3"/>
    <line x1="300" y1="0" x2="300" y2="200" stroke="#00e5ff" stroke-width="0.3"/>
    <line x1="400" y1="0" x2="400" y2="200" stroke="#00e5ff" stroke-width="0.3"/>
    <line x1="500" y1="0" x2="500" y2="200" stroke="#00e5ff" stroke-width="0.3"/>
    <line x1="600" y1="0" x2="600" y2="200" stroke="#00e5ff" stroke-width="0.3"/>
    <line x1="700" y1="0" x2="700" y2="200" stroke="#00e5ff" stroke-width="0.3"/>
    <line x1="800" y1="0" x2="800" y2="200" stroke="#00e5ff" stroke-width="0.3"/>
    <line x1="900" y1="0" x2="900" y2="200" stroke="#00e5ff" stroke-width="0.3"/>
    <line x1="1000" y1="0" x2="1000" y2="200" stroke="#00e5ff" stroke-width="0.3"/>
    <line x1="1100" y1="0" x2="1100" y2="200" stroke="#00e5ff" stroke-width="0.3"/>
  </g>

  <!-- Scanning line animation -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#scanLine)" opacity="0.5">
    <animate attributeName="y" values="0;200;0" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Corner brackets - top left -->
  <g filter="url(#glow)" opacity="0.7">
    <line x1="20" y1="20" x2="60" y2="20" stroke="#00e5ff" stroke-width="1.5"/>
    <line x1="20" y1="20" x2="20" y2="50" stroke="#00e5ff" stroke-width="1.5"/>
    <!-- top right -->
    <line x1="1140" y1="20" x2="1180" y2="20" stroke="#00e5ff" stroke-width="1.5"/>
    <line x1="1180" y1="20" x2="1180" y2="50" stroke="#00e5ff" stroke-width="1.5"/>
    <!-- bottom left -->
    <line x1="20" y1="180" x2="60" y2="180" stroke="#00e5ff" stroke-width="1.5"/>
    <line x1="20" y1="150" x2="20" y2="180" stroke="#00e5ff" stroke-width="1.5"/>
    <!-- bottom right -->
    <line x1="1140" y1="180" x2="1180" y2="180" stroke="#00e5ff" stroke-width="1.5"/>
    <line x1="1180" y1="150" x2="1180" y2="180" stroke="#00e5ff" stroke-width="1.5"/>
  </g>

  <!-- Pulsing dots -->
  <circle cx="70" cy="20" r="2" fill="#00e5ff" filter="url(#glow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1130" cy="20" r="2" fill="#00e5ff" filter="url(#glow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="70" cy="180" r="2" fill="#00e5ff" filter="url(#glow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle cx="1130" cy="180" r="2" fill="#00e5ff" filter="url(#glow)">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" begin="1.5s"/>
  </circle>

  <!-- Left side: system status indicators -->
  <g opacity="0.4" font-family="'Courier New', monospace" font-size="9" fill="#00e5ff">
    <text x="35" y="45">SYS: ONLINE</text>
    <text x="35" y="58">GPS: LOCKED</text>
    <text x="35" y="71">AI:  ACTIVE</text>
    <circle cx="30" cy="42" r="2" fill="#00ff88">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="55" r="2" fill="#00ff88">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="30" cy="68" r="2" fill="#00ff88">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
  </g>

  <!-- Right side: telemetry data -->
  <g opacity="0.35" font-family="'Courier New', monospace" font-size="9" fill="#00e5ff" text-anchor="end">
    <text x="1165" y="45">ALT: 450m</text>
    <text x="1165" y="58">VEL: 14m/s</text>
    <text x="1165" y="71">BAT: 88%</text>
    <text x="1165" y="160">COMP: ACTIVE</text>
    <text x="1165" y="173">TGT: ACQUIRED</text>
  </g>

  <!-- Horizontal divider lines -->
  <line x1="150" y1="85" x2="450" y2="85" stroke="url(#glowLine)" stroke-width="0.5"/>
  <line x1="750" y1="85" x2="1050" y2="85" stroke="url(#glowLine)" stroke-width="0.5"/>
  <line x1="150" y1="145" x2="450" y2="145" stroke="url(#glowLine)" stroke-width="0.5"/>
  <line x1="750" y1="145" x2="1050" y2="145" stroke="url(#glowLine)" stroke-width="0.5"/>

  <!-- Main title -->
  <text x="600" y="108" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="6" filter="url(#textGlow)">
    OM SHUKLA
  </text>

  <!-- Subtitle -->
  <text x="600" y="135" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#00e5ff" text-anchor="middle" letter-spacing="4" font-weight="300" filter="url(#textGlow)">
    AUTONOMOUS SYSTEMS ENGINEER
  </text>

  <!-- Bottom tagline -->
  <text x="600" y="165" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#4a5568" text-anchor="middle" letter-spacing="3">
    AI AGENTS  •  COMPUTER VISION  •  DRONE INTELLIGENCE
  </text>

  <!-- Small drone icon (simplified) - left of title -->
  <g transform="translate(380, 95)" opacity="0.3" fill="none" stroke="#00e5ff" stroke-width="0.8">
    <line x1="0" y1="5" x2="15" y2="0"/>
    <line x1="0" y1="5" x2="15" y2="10"/>
    <line x1="0" y1="5" x2="-15" y2="0"/>
    <line x1="0" y1="5" x2="-15" y2="10"/>
    <circle cx="15" cy="0" r="4"/>
    <circle cx="15" cy="10" r="4"/>
    <circle cx="-15" cy="0" r="4"/>
    <circle cx="-15" cy="10" r="4"/>
    <rect x="-3" y="2" width="6" height="6" rx="1"/>
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite"/>
  </g>

  <!-- Small drone icon - right of title -->
  <g transform="translate(820, 95)" opacity="0.3" fill="none" stroke="#00e5ff" stroke-width="0.8">
    <line x1="0" y1="5" x2="15" y2="0"/>
    <line x1="0" y1="5" x2="15" y2="10"/>
    <line x1="0" y1="5" x2="-15" y2="0"/>
    <line x1="0" y1="5" x2="-15" y2="10"/>
    <circle cx="15" cy="0" r="4"/>
    <circle cx="15" cy="10" r="4"/>
    <circle cx="-15" cy="0" r="4"/>
    <circle cx="-15" cy="10" r="4"/>
    <rect x="-3" y="2" width="6" height="6" rx="1"/>
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite" begin="1.5s"/>
  </g>
</svg>
